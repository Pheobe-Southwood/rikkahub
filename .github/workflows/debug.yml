name: Debug Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Cache web-ui node_modules
        uses: actions/cache@v4
        with:
          path: web-ui/node_modules
          key: ${{ runner.os }}-webui-node-modules-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-webui-node-modules-

      - name: Install web-ui build dependencies (zsh + pnpm)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zsh
          npm install -g pnpm
          cd web-ui && pnpm install --frozen-lockfile && cd ..

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Prepare build files
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Gradle Debug Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --parallel --configuration-cache

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
